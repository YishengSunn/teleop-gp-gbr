      arm_id: follower

  joint_impedance_controller:
    ros__parameters:
      command_arm_id: follower
      source_arm_id: leader
      joint_impedance_topic: /leader/joint_states

      k_gains: [600.0, 600.0, 600.0, 600.0, 250.0, 150.0, 50.0]
      d_gains: [30.0, 30.0, 30.0, 10.0, 10.0, 10.0, 5.0]

      move_to_start: true
      start_k_gains: [600.0, 600.0, 600.0, 600.0, 250.0, 150.0, 50.0]
      start_d_gains: [30.0, 30.0, 30.0, 10.0, 10.0, 10.0, 5.0]
      # start_joint_configuration:
      #   [0.0564, -0.2057, -0.1670, -1.7927, -0.1318, 1.5700, 0.4203]

  cartesian_impedance_controller:
    ros__parameters:
      arm_id: follower
      leader_robot_state_topic: /leader/franka_robot_state_broadcaster/robot_state
      
      pos_stiff: 500.0
      rot_stiff: 20.0

      execution_running_topic: "/execution/running"
      execution_pose_topic: "/execution/desired_pose"
      blend_running_topic: "/execution/blend_to_leader_running"

      blend_to_leader_enabled: true
      blend_seconds_per_meter: 2.0
      blend_seconds_per_rad: 1.2
      blend_duration_min: 0.25
      blend_duration_max: 8.0
      blend_running_hold_sec: 0.5
