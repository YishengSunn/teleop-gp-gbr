leader:
  controller_manager:
    ros__parameters:
      update_rate: 1000  # Hz

      move_to_start_example_controller:
        type: franka_example_controllers/MoveToStartExampleController

      joint_impedance_example_controller:
        type: franka_example_controllers/JointImpedanceExampleController
      
      cartesian_impedance_example_controller:
        type: franka_example_controllers/CartesianImpedanceExampleController

      joint_position_example_controller:
        type: franka_example_controllers/JointPositionExampleController

      joint_velocity_example_controller:
        type: franka_example_controllers/JointVelocityExampleController
      
      cartesian_velocity_example_controller:
        type: franka_example_controllers/CartesianVelocityExampleController

      joint_trajectory_controller:
        type: joint_effort_trajectory_controller/JointTrajectoryController

      model_example_controller:
        type: franka_example_controllers/ModelExampleController

      gravity_compensation_example_controller:
        type: franka_example_controllers/GravityCompensationExampleController

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster
      
      gravity_compensation_with_joint_torque_feedback_controller:
        type: geo_gp_controllers/GravityCompensationWithJointTorqueFeedbackController
      
      haptic_gravity_compensation_controller:
        type: franka_example_controllers/HapticGravityCompensationController

  move_to_start_example_controller:
    ros__parameters:
      arm_id: leader
      k_gains:
        - 600.0
        - 600.0
        - 600.0
        - 600.0
        - 250.0
        - 150.0
        - 50.0
      d_gains:
        - 30.0
        - 30.0
        - 30.0
        - 30.0
        - 10.0
        - 10.0
        - 5.

  joint_impedance_example_controller:
    ros__parameters:
      arm_id: leader
      k_gains:
        - 24.0
        - 24.0
        - 24.0
        - 24.0
        - 10.0
        - 6.0
        - 2.0
      d_gains:
        - 2.0
        - 2.0
        - 2.0
        - 1.0
        - 1.0
        - 1.0
        - 0.5

  cartesian_impedance_example_controller:
    ros__parameters:
      arm_id: leader

  joint_position_example_controller:
    ros__parameters:
      arm_id: leader

  joint_velocity_example_controller:
    ros__parameters:
      arm_id: leader

  cartesian_velocity_example_controller:
    ros__parameters:
      arm_id: leader

  joint_trajectory_controller:
    ros__parameters:
      joints:
        - panda_joint1
        - panda_joint2
        - panda_joint3
        - panda_joint4
        - panda_joint5
        - panda_joint6
        - panda_joint7
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity
      gains:
        panda_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
        panda_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
        panda_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
        panda_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
        panda_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
        panda_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
        panda_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }

  model_example_controller:
    ros__parameters:
      arm_id: leader

  franka_robot_state_broadcaster:
    ros__parameters:
      arm_id: leader

  haptic_gravity_compensation_controller:
    ros__parameters:
      arm_id: leader
      follower_input_mode: "joint_states"  # or "torque_topic"
      follower_torque_topic: /haptic/follower_tau
      joint_state_topic: /joint_states
      lpf_alpha: 0.1
      torque_clamp: [6.0, 6.0, 6.0, 6.0, 3.0, 3.0, 2.0]

      # Impedance (used only in joint_states mode)
      k_gains: [300.0, 300.0, 300.0, 250.0, 150.0, 100.0, 50.0]
      d_gains: [10.0, 10.0, 10.0, 8.0, 6.0, 4.0, 3.0]

      # Desired-q publisher to your existing follower controller
      publish_desired_q: true
      desired_q_topic: /joint_impedance/joints_desired

  gravity_compensation_with_joint_torque_feedback_controller:
    ros__parameters:
      arm_id: leader

      enable_feedback: true
      move_to_start: false

      # Move-to-start
      k_gains: [600.0, 600.0, 600.0, 600.0, 250.0, 150.0, 50.0]
      d_gains: [30.0, 30.0, 30.0, 30.0, 10.0, 10.0, 5.0]
      # start_joint_configuration:
      #   [0.0564, -0.2057, -0.1670, -1.7927, -0.1318, 1.5700, 0.4203]

      # Feedback signal (follower -> leader joint torques)
      # measured: tau_ext_hat_filtered (contact / external torque estimate)
      # commanded: tau_j_d (controller command torque; tracks motion even in free air)
      feedback_source: "measured"
      # Empty: pick topic from feedback_source. Non-empty: use this topic (overrides feedback_source).
      torque_feedback_topic: ""

      # Processing (after subscribe, before writing leader effort)
      subtract_first_bias: true  # Use first good sample as bias so feedback starts near zero
      feedback_scale: 1.0
      feedback_max_abs_tau: 15.0  # Per-joint limit after scale (Nm)

      # During move-to-start: if true, add feedback on top of PD; if false, feedback only after move-to-start
      feedback_additive: false

      # While geo_gp prediction is executing (trajectory_executor /execution/running == true)
      suppress_feedback_during_execution: true
      execution_running_topic: "/execution/running"
      # Effective scale = feedback_scale * execution_feedback_scale while running; 0 = off
      execution_feedback_scale: 0.2


follower:
  controller_manager:
    ros__parameters:
